{% extends "base/base.html" %}

{% block body %}

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --pl:        #f4f1eb;
    --pl2:       #e8e4dc;
    --champ:     #d4c9b0;
    --champ2:    #c9bb9a;
    --silk:      #f9f7f4;
    --ink:       #1a1814;
    --ink2:      #2e2b26;
    --mt:        #8a8070;
    --mt2:       #b5ad9e;
    --border-c:  rgba(212,201,176,0.35);
    --border2-c: rgba(212,201,176,0.58);
    --danger:    #9e3a3a;
    --card-s:    0 32px 80px rgba(100,85,55,0.13), 0 8px 24px rgba(100,85,55,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .rp-root {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.25rem;
    background: #f5f2ec;
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* Subtle background orbs — static, no animation */
  .rp-bg { position: absolute; inset: 0; pointer-events: none; }
  .rp-orb {
    position: absolute; border-radius: 50%;
    filter: blur(90px); opacity: 0.5;
  }
  .rp-orb:nth-child(1) {
    width: 480px; height: 480px; top: -100px; left: -80px;
    background: radial-gradient(circle, #e2d4b8 0%, transparent 70%);
  }
  .rp-orb:nth-child(2) {
    width: 360px; height: 360px; bottom: -60px; right: -60px;
    background: radial-gradient(circle, #d4c9b0 0%, transparent 70%);
  }

  /* Card */
  .rp-card {
    width: 100%;
    max-width: 460px;
    background: rgba(255,253,250,0.93);
    border: 1px solid var(--border2-c);
    border-radius: 32px;
    padding: 3rem 2.6rem 2.6rem;
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.72) inset,
      0 2px 0 rgba(255,255,255,0.9) inset,
      var(--card-s);
    position: relative;
  }
  /* Decorative top shimmer line */
  .rp-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--champ), var(--pl2), var(--champ), transparent);
    border-radius: 0 0 2px 2px;
  }

  /* Logo mark */
  .rp-logomark {
    width: 52px; height: 52px;
    border-radius: 16px;
    background: linear-gradient(145deg, var(--pl2) 0%, var(--champ) 100%);
    border: 1px solid var(--border2-c);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.8rem;
    box-shadow: 0 4px 16px rgba(180,155,100,0.18), 0 1px 3px rgba(0,0,0,0.05);
  }
  .rp-logomark svg { width: 26px; height: 26px; }

  /* Heading */
  .rp-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.35rem; font-weight: 500;
    color: var(--ink); line-height: 1.15; letter-spacing: -0.5px;
  }
  .rp-subtitle {
    font-size: 0.82rem; color: var(--mt);
    margin-top: 0.5rem; font-weight: 400; letter-spacing: 0.01em;
    line-height: 1.6;
  }

  /* Divider */
  .rp-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2-c), transparent);
    margin: 1.6rem 0;
  }

  /* Fields */
  .rp-fields { display: flex; flex-direction: column; gap: 1.1rem; }
  .rp-field  { display: flex; flex-direction: column; gap: 0.35rem; }
  .rp-label {
    font-size: 0.68rem; font-weight: 600; color: var(--mt);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .rp-input-wrap { position: relative; }
  .rp-input-icon {
    position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
    color: var(--mt2); pointer-events: none;
    display: flex; align-items: center;
  }
  .rp-input {
    width: 100%;
    padding: 0.9rem 1rem 0.9rem 2.85rem;
    background: var(--silk);
    border: 1.5px solid var(--border-c);
    border-radius: 14px;
    color: var(--ink2); font-size: 0.93rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  .rp-input::placeholder { color: var(--mt2); opacity: 0.8; }
  .rp-input:hover { border-color: var(--champ2); }
  .rp-input:focus {
    border-color: var(--champ2);
    box-shadow: 0 0 0 3.5px rgba(201,187,154,0.22);
    background: #fffef9;
  }
  .rp-input.invalid {
    border-color: rgba(158,58,58,0.5);
    box-shadow: 0 0 0 3px rgba(158,58,58,0.1);
  }

  /* Password toggle */
  .rp-pw-toggle {
    position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
    color: var(--mt2); cursor: pointer; background: none; border: none;
    padding: 0.25rem; display: flex; align-items: center; transition: color 0.15s;
  }
  .rp-pw-toggle:hover { color: var(--mt); }

  /* Field errors */
  .rp-field-error {
    font-size: 0.74rem; color: var(--danger);
    display: none; align-items: center; gap: 0.3rem;
  }
  .rp-field-error.visible { display: flex; }

  /* Password strength */
  .rp-strength { margin-top: .4rem; display: none; }
  .rp-strength.visible { display: block; }
  .rp-strength-bar {
    height: 3px; border-radius: 2px;
    background: var(--border-c);
    overflow: hidden; margin-bottom: .3rem;
  }
  .rp-strength-fill {
    height: 100%; border-radius: 2px;
    transition: width .3s, background .3s;
    width: 0%;
  }
  .rp-strength-lbl { font-size: .66rem; color: var(--mt2); }

  /* Submit */
  .rp-submit {
    width: 100%;
    padding: 1rem;
    border-radius: 14px; border: none;
    background: linear-gradient(145deg, var(--ink2) 0%, var(--ink) 100%);
    color: var(--pl2);
    font-weight: 500; font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin-top: 1.6rem;
    letter-spacing: 0.02em;
    position: relative; overflow: hidden;
    transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 20px rgba(26,24,20,0.22), 0 2px 6px rgba(26,24,20,0.1);
  }
  .rp-submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(26,24,20,0.25);
  }
  .rp-submit:active:not(:disabled) { transform: scale(0.99); }
  .rp-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  /* Shimmer on hover */
  .rp-submit::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: skewX(-15deg); transition: left 0.6s;
  }
  .rp-submit:hover::before { left: 150%; }
  .rp-submit::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Spinner */
  .rp-spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--pl2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .rp-submit.loading .rp-btn-text { display: none; }
  .rp-submit.loading .rp-spinner  { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .rp-footer {
    text-align: center; margin-top: 1.5rem;
    font-size: 0.8rem; color: var(--mt);
  }
  .rp-footer a {
    color: var(--ink2); text-decoration: none; font-weight: 600;
    border-bottom: 1px solid var(--border2-c); padding-bottom: 0.5px;
    transition: border-color 0.15s, color 0.15s;
  }
  .rp-footer a:hover { color: var(--ink); border-color: var(--champ2); }

  /* ── Mobile: full-screen native feel ── */
  @media (max-width: 600px) {
    .rp-root {
      padding: 0;
      align-items: stretch;
      justify-content: flex-start;
      min-height: 100dvh;
    }
    .rp-bg { display: none; }
    .rp-card {
      max-width: 100%;
      min-height: 100dvh;
      border-radius: 0;
      border: none;
      padding: 3.5rem 1.75rem 2.5rem;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .rp-title { font-size: 2.1rem; }
    .rp-logomark { width: 48px; height: 48px; border-radius: 14px; margin-bottom: 1.5rem; }
    .rp-input {
      padding: 1rem 1rem 1rem 2.9rem;
      font-size: 1rem;
      border-radius: 16px;
    }
    .rp-submit { padding: 1.05rem; border-radius: 16px; font-size: 1rem; margin-top: 1.8rem; }
    .rp-divider { margin: 1.4rem 0; }
    .rp-fields { gap: 1.2rem; }
    .rp-footer { margin-top: 1.75rem; font-size: 0.85rem; }
  }
  @media (max-width: 375px) {
    .rp-card { padding: 2.8rem 1.4rem 2rem; }
    .rp-title { font-size: 1.85rem; }
  }
</style>

<div class="rp-root">
  <div class="rp-bg">
    <div class="rp-orb"></div>
    <div class="rp-orb"></div>
  </div>

  <div class="rp-card">

    <div class="rp-logomark">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="13" cy="13" r="10.5" stroke="#c9bb9a" stroke-width="1.5"/>
        <path d="M9.5 13h7M13 9.5v7" stroke="#c9bb9a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="13" cy="13" r="4" fill="rgba(201,187,154,0.18)"/>
      </svg>
    </div>

    <div class="rp-title">Регистрация</div>
    <div class="rp-subtitle">Создайте аккаунт и начните управлять финансами.</div>

    <div class="rp-divider"></div>

    <form id="regForm" method="POST" action="/auth/register/">
      {% csrf_token %}
      <div class="rp-fields">

        <!-- Full Name -->
        <div class="rp-field">
          <label class="rp-label">Полное имя</label>
          <div class="rp-input-wrap">
            <span class="rp-input-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="7.5" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/>
                <path d="M1.5 13.5c0-2.485 2.686-4.5 6-4.5s6 2.015 6 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </span>
            <input class="rp-input" type="text" name="name" id="nameInput"
              placeholder="Имя" required autocomplete="name"/>
          </div>
          <span class="rp-field-error" id="nameError">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M6 4v2.5M6 8h.01" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            <span></span>
          </span>
        </div>

        <!-- Email -->
        <div class="rp-field">
          <label class="rp-label">Электронная почта</label>
          <div class="rp-input-wrap">
            <span class="rp-input-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <rect x="1.5" y="3" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.2"/>
                <path d="M1.5 5.5l5.3 3.5a1.2 1.2 0 001.4 0L13.5 5.5" stroke="currentColor" stroke-width="1.2"/>
              </svg>
            </span>
            <input class="rp-input" type="email" name="email" id="emailInput"
              placeholder="вы@gmail.com" required autocomplete="email"/>
          </div>
          <span class="rp-field-error" id="emailError">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M6 4v2.5M6 8h.01" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            <span></span>
          </span>
        </div>

        <!-- Password -->
        <div class="rp-field">
          <label class="rp-label">Пароль</label>
          <div class="rp-input-wrap">
            <span class="rp-input-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <rect x="3" y="6" width="9" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M5 6V4.5a2.5 2.5 0 015 0V6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <circle cx="7.5" cy="9.5" r="1" fill="currentColor"/>
              </svg>
            </span>
            <input class="rp-input" type="password" name="password" id="passwordInput"
              placeholder="Мин. 4 символа" required autocomplete="new-password"/>
            <button type="button" class="rp-pw-toggle" id="pwToggle" tabindex="-1" aria-label="Показать пароль">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/>
                <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>
              </svg>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="rp-strength" id="pwStrength">
            <div class="rp-strength-bar">
              <div class="rp-strength-fill" id="pwStrengthFill"></div>
            </div>
            <span class="rp-strength-lbl" id="pwStrengthLbl"></span>
          </div>
          <span class="rp-field-error" id="passwordError">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M6 4v2.5M6 8h.01" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            <span></span>
          </span>
        </div>

      </div>

      <button type="submit" class="rp-submit" id="regSubmit">
        <span class="rp-btn-text">Создать аккаунт</span>
        <span class="rp-spinner"></span>
      </button>
    </form>

    <div class="rp-footer">
      Уже есть аккаунт? <a href="/auth/login/">Войти</a>
    </div>

  </div>
</div>

<script>
  /* ── Password show/hide ── */
  const pwInput  = document.getElementById('passwordInput');
  const eyeIcon  = document.getElementById('eyeIcon');
  document.getElementById('pwToggle').addEventListener('click', function() {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 2l12 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>'
      : '<ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>';
  });

  /* ── Password strength ── */
  const strengthBar  = document.getElementById('pwStrength');
  const strengthFill = document.getElementById('pwStrengthFill');
  const strengthLbl  = document.getElementById('pwStrengthLbl');

  pwInput.addEventListener('input', function() {
    const v = this.value;
    if (!v) { strengthBar.classList.remove('visible'); return; }
    strengthBar.classList.add('visible');
    let score = 0;
    if (v.length >= 4)  score++;
    if (v.length >= 8)  score++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    const levels = [
      { w: '20%',  bg: '#e05a5a', lbl: 'Очень слабый' },
      { w: '40%',  bg: '#e07a3a', lbl: 'Слабый' },
      { w: '60%',  bg: '#c9a84c', lbl: 'Средний' },
      { w: '80%',  bg: '#6aaa6a', lbl: 'Хороший' },
      { w: '100%', bg: '#2e7a56', lbl: 'Отличный' },
    ];
    const lvl = levels[Math.min(score, 4)];
    strengthFill.style.width = lvl.w;
    strengthFill.style.background = lvl.bg;
    strengthLbl.textContent = lvl.lbl;
    strengthLbl.style.color = lvl.bg;
  });

  /* ── Form submit ── */
  const form = document.getElementById('regForm');
  const btn  = document.getElementById('regSubmit');

  function clearErrors() {
    document.querySelectorAll('.rp-field-error').forEach(el => {
      el.classList.remove('visible');
      el.querySelector('span') && (el.querySelector('span').textContent = '');
    });
    document.querySelectorAll('.rp-input').forEach(el => el.classList.remove('invalid'));
  }

  function showFieldError(field, msg) {
    const errEl = document.getElementById(field + 'Error');
    const input = document.getElementById(field + 'Input');
    if (errEl) { errEl.querySelector('span').textContent = msg; errEl.classList.add('visible'); }
    if (input) input.classList.add('invalid');
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res  = await fetch(this.action, {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: new FormData(this),
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('pending_email', document.getElementById('emailInput').value.trim());
        window.location.href = data.redirect;
      } else {
        Object.entries(data.errors || {}).forEach(([key, msg]) => showFieldError(key, msg));
      }
    } catch (err) {
      alert('Ошибка сети. Попробуйте ещё раз.');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
  });
</script>

{% endblock %}
