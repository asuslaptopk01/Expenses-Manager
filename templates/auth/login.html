{% extends "base/base.html" %}

{% block body %}

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --platinum: #e8e4dc;
    --platinum2: #f4f1eb;
    --champagne: #d4c9b0;
    --champagne2: #c9bb9a;
    --silk: #f9f7f4;
    --ink: #1a1814;
    --ink2: #2e2b26;
    --muted: #8a8070;
    --muted2: #b5ad9e;
    --accent: #c8b99a;
    --accent2: #e2d5c0;
    --success: #4a7c59;
    --danger: #a04040;
    --glow: rgba(212,201,176,0.18);
    --glow2: rgba(200,185,154,0.12);
    --card-bg: rgba(255,253,250,0.92);
    --border: rgba(212,201,176,0.35);
    --border2: rgba(212,201,176,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .lp-root {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.25rem;
    background: #f5f2ec;
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* Animated background mesh */
  .lp-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .lp-bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    animation: orb-drift 14s ease-in-out infinite alternate;
  }
  .lp-bg-orb:nth-child(1) { width: 500px; height: 500px; top: -120px; left: -100px; background: radial-gradient(circle, #e2d4b8 0%, transparent 70%); animation-duration: 16s; }
  .lp-bg-orb:nth-child(2) { width: 400px; height: 400px; bottom: -80px; right: -80px; background: radial-gradient(circle, #d4c9b0 0%, transparent 70%); animation-duration: 20s; animation-delay: -4s; }
  .lp-bg-orb:nth-child(3) { width: 300px; height: 300px; top: 40%; left: 55%; background: radial-gradient(circle, #c9d4b4 0%, transparent 70%); animation-duration: 12s; animation-delay: -8s; opacity: 0.3; }
  @keyframes orb-drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.08); } }

  /* Floating coins animation */
  .lp-coins {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .lp-coin {
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e8d8b0 0%, #c9b07a 40%, #e8d8b0 60%, #b89a5a 100%);
    border: 1.5px solid rgba(180,150,80,0.4);
    opacity: 0;
    animation: coin-float linear infinite;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: rgba(100,75,30,0.7);
    font-family: 'DM Sans', sans-serif;
    letter-spacing: -0.5px;
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.5), inset 0 -2px 3px rgba(0,0,0,0.1);
  }
  .lp-coin::after {
    content: '₩';
    font-size: 11px;
    color: rgba(100,75,30,0.6);
  }
  @keyframes coin-float {
    0%   { opacity: 0; transform: translateY(110vh) rotate(0deg) scale(0.7); }
    10%  { opacity: 0.85; }
    80%  { opacity: 0.65; }
    100% { opacity: 0; transform: translateY(-15vh) rotate(380deg) scale(1.1); }
  }

  /* ── Global nav button size fix ────────────────── */
  /* Targets common Django/Bootstrap nav link patterns */
  nav a, header a, .navbar a,
  nav button, header button, .navbar button {
    min-height: 40px;
    min-width: 80px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem 1.1rem;
    font-size: 0.9rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Main card */
  .lp-card {
    width: 100%;
    max-width: 460px;
    background: var(--card-bg);
    border: 1px solid var(--border2);
    border-radius: 32px;
    padding: 3rem 2.6rem 2.6rem;
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.7) inset,
      0 2px 0 rgba(255,255,255,0.9) inset,
      0 32px 80px rgba(100,85,55,0.15),
      0 8px 24px rgba(100,85,55,0.08);
    position: relative;
    animation: card-in 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Decorative top line */
  .lp-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--champagne), var(--accent2), var(--champagne), transparent);
    border-radius: 0 0 2px 2px;
  }

  /* Logo mark */
  .lp-logomark {
    width: 52px; height: 52px;
    border-radius: 16px;
    background: linear-gradient(145deg, var(--platinum2) 0%, var(--champagne) 100%);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.8rem;
    box-shadow: 0 4px 16px rgba(180,155,100,0.2), 0 1px 3px rgba(0,0,0,0.06);
    animation: card-in 0.7s 0.05s cubic-bezier(0.22,1,0.36,1) both;
  }
  .lp-logomark svg { width: 26px; height: 26px; }

  .lp-heading { animation: card-in 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both; }
  .lp-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.35rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.15;
    letter-spacing: -0.5px;
  }
  .lp-subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.5rem;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* Divider */
  .lp-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
    margin: 1.6rem 0;
  }

  /* General error */
  .lp-general-error {
    background: rgba(160,64,64,0.07);
    border: 1px solid rgba(160,64,64,0.22);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    font-size: 0.8rem;
    color: var(--danger);
    margin-bottom: 1.2rem;
    display: none;
    animation: shake 0.35s cubic-bezier(.36,.07,.19,.97);
  }
  .lp-general-error.visible { display: flex; gap: 0.5rem; align-items: center; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  /* Fields */
  .lp-fields { display: flex; flex-direction: column; gap: 1.1rem; }
  .lp-field { display: flex; flex-direction: column; gap: 0.35rem; }
  .lp-label {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .lp-input-wrap { position: relative; }
  .lp-input-icon {
    position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
    color: var(--muted2); pointer-events: none;
    display: flex; align-items: center;
  }
  .lp-input {
    width: 100%;
    padding: 0.9rem 1rem 0.9rem 2.85rem;
    background: var(--silk);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--ink2);
    font-size: 0.93rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  .lp-input::placeholder { color: var(--muted2); opacity: 0.8; }
  .lp-input:hover { border-color: var(--champagne2); }
  .lp-input:focus {
    border-color: var(--champagne2);
    box-shadow: 0 0 0 3.5px rgba(201,187,154,0.22);
    background: #fffef9;
  }
  .lp-input.invalid {
    border-color: rgba(160,64,64,0.5);
    box-shadow: 0 0 0 3px rgba(160,64,64,0.1);
  }

  /* Password toggle */
  .lp-pw-toggle {
    position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
    color: var(--muted2); cursor: pointer; background: none; border: none;
    padding: 0.25rem; display: flex; align-items: center;
    transition: color 0.15s;
  }
  .lp-pw-toggle:hover { color: var(--muted); }

  .lp-field-error {
    font-size: 0.74rem;
    color: var(--danger);
    display: none;
    align-items: center;
    gap: 0.3rem;
  }
  .lp-field-error.visible { display: flex; }

  /* CTA button */
  .lp-submit {
    width: 100%;
    padding: 1rem 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(145deg, var(--ink2) 0%, var(--ink) 100%);
    color: var(--platinum2);
    font-weight: 500;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 1.6rem;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 6px 20px rgba(26,24,20,0.22), 0 2px 6px rgba(26,24,20,0.1);
  }
  .lp-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(26,24,20,0.25), 0 3px 8px rgba(26,24,20,0.12); }
  .lp-submit:active:not(:disabled) { transform: translateY(0px) scale(0.99); }
  .lp-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .lp-submit::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  /* Shimmer on hover */
  .lp-submit::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-15deg);
    transition: left 0.6s;
  }
  .lp-submit:hover::before { left: 150%; }

  /* Loading spinner */
  .lp-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--platinum2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .lp-submit.loading .lp-btn-text { display: none; }
  .lp-submit.loading .lp-spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .lp-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .lp-footer a {
    color: var(--ink2);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px solid var(--border2);
    padding-bottom: 0.5px;
    transition: border-color 0.15s, color 0.15s;
  }
  .lp-footer a:hover { color: var(--ink); border-color: var(--champagne2); }

  /* UZS badge */
  .lp-uzs-badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: linear-gradient(135deg, var(--platinum2), var(--accent2));
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.18rem 0.55rem;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  /* App brand shown only on mobile, above card */
  .lp-brand {
    display: none;
  }

  /* ── Mobile: full-screen native feel ── */
  @media (max-width: 600px) {
    .lp-root {
      padding: 0;
      align-items: stretch;
      justify-content: flex-start;
      min-height: 100dvh;
      flex-direction: column;
    }
    /* Show brand header on mobile */
    .lp-brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: 1.1rem 1.5rem .9rem;
      background: rgba(245,242,236,0.95);
      border-bottom: 1px solid rgba(212,201,176,0.3);
      flex-shrink: 0;
      animation: fadeDown .5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lp-brand-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(145deg, #e8e4dc 0%, #c9bb9a 100%);
      border: 1px solid rgba(212,201,176,0.55);
      display: grid; place-items: center;
      box-shadow: 0 2px 8px rgba(180,155,100,0.15);
      flex-shrink: 0;
    }
    .lp-brand-icon svg { width: 18px; height: 18px; }
    .lp-brand-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: #2e2b26; letter-spacing: -.02em;
    }

    /* Coins visible & active on mobile */
    .lp-coins { display: block; }

    .lp-card {
      max-width: 100%;
      flex: 1;
      border-radius: 0;
      border: none;
      padding: 2.4rem 1.75rem 2.2rem;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* Card entrance animation on mobile too */
      animation: card-in 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
    /* Hide the small icon logomark on mobile — brand bar replaces it */
    .lp-logomark { display: none; }
    .lp-card > * { flex-shrink: 0; }
    .lp-title { font-size: 2rem; }
    .lp-input {
      padding: 1rem 1rem 1rem 2.9rem;
      font-size: 1rem;
      border-radius: 16px;
    }
    .lp-submit {
      padding: 1.05rem 1rem;
      border-radius: 16px;
      font-size: 1rem;
      margin-top: 1.8rem;
    }
    .lp-divider { margin: 1.35rem 0; }
    .lp-fields { gap: 1.2rem; }
    .lp-footer { margin-top: 1.6rem; font-size: 0.85rem; }
  }

  /* Very small phones */
  @media (max-width: 375px) {
    .lp-card { padding: 2rem 1.35rem 1.8rem; }
    .lp-title { font-size: 1.8rem; }
    .lp-input { font-size: 0.96rem; }
    .lp-brand { padding: .9rem 1.2rem .75rem; }
  }
</style>

<div class="lp-root">
  <!-- Background effects -->
  <div class="lp-bg">
    <div class="lp-bg-orb"></div>
    <div class="lp-bg-orb"></div>
    <div class="lp-bg-orb"></div>
  </div>
  <!-- Floating coins -->
  <div class="lp-coins" id="lpCoins"></div>

  <!-- Mobile-only brand bar -->
  <div class="lp-brand">
    <div class="lp-brand-icon">
      <svg viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="10.5" stroke="#c9bb9a" stroke-width="1.5"/>
        <path d="M9.5 13h7M13 9.5v7" stroke="#c9bb9a" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="lp-brand-name">ExpensesManager</span>
  </div>

  <div class="lp-card">
    <!-- Logo mark -->
    <div class="lp-logomark">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="13" cy="13" r="10.5" stroke="#c9bb9a" stroke-width="1.5"/>
        <path d="M9.5 13h7M13 9.5v7" stroke="#c9bb9a" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="13" cy="13" r="4" fill="rgba(201,187,154,0.18)"/>
      </svg>
    </div>

    <div class="lp-heading">
      <div class="lp-title">С возвращением</div>
      <div class="lp-subtitle">Войдите, чтобы отслеживать финансы <span class="lp-uzs-badge">UZS</span></div>
    </div>

    <div class="lp-divider"></div>

    <div class="lp-general-error" id="generalError">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 4.5v3M7 9.5h.01" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span id="generalErrorText"></span>
    </div>

    <form id="loginForm" method="POST" action="/auth/login/">
      {% csrf_token %}
      <div class="lp-fields">

        <div class="lp-field">
          <label class="lp-label">Электронная почта</label>
          <div class="lp-input-wrap">
            <span class="lp-input-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="3" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 5.5l5.3 3.5a1.2 1.2 0 001.4 0L13.5 5.5" stroke="currentColor" stroke-width="1.2"/></svg>
            </span>
            <input class="lp-input" type="email" name="email" id="emailInput" placeholder="вы@gmail.com" required autocomplete="email" />
          </div>
          <span class="lp-field-error" id="emailError">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M6 4v2.5M6 8h.01" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            <span></span>
          </span>
        </div>

        <div class="lp-field">
          <label class="lp-label">Пароль</label>
          <div class="lp-input-wrap">
            <span class="lp-input-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="3" y="6" width="9" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 6V4.5a2.5 2.5 0 015 0V6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="7.5" cy="9.5" r="1" fill="currentColor"/></svg>
            </span>
            <input class="lp-input" type="password" name="password" id="passwordInput" placeholder="Ваш пароль" required autocomplete="current-password" />
            <button type="button" class="lp-pw-toggle" id="pwToggle" tabindex="-1" aria-label="Показать пароль">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
          </div>
          <span class="lp-field-error" id="passwordError">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M6 4v2.5M6 8h.01" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            <span></span>
          </span>
        </div>

      </div>

      <button type="submit" class="lp-submit" id="loginSubmit">
        <span class="lp-btn-text">Войти</span>
        <span class="lp-spinner"></span>
      </button>
    </form>

    <div class="lp-footer">
      Нет аккаунта? <a href="/auth/register/">Зарегистрироваться</a>
    </div>
  </div>
</div>
<script>
  /* ── Floating coins ───────────────────────────── */
  (function() {
    const container = document.getElementById('lpCoins');
    const symbols = ['₩','$','€','₽','¥'];
    function spawnCoin() {
      const coin = document.createElement('div');
      coin.className = 'lp-coin';
      const size = 18 + Math.random() * 20;
      coin.style.cssText = `
        width:${size}px;height:${size}px;
        left:${Math.random()*96}%;
        animation-duration:${7 + Math.random()*10}s;
        animation-delay:${Math.random()*2}s;
        font-size:${size*0.42}px;
      `;
      coin.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      container.appendChild(coin);
      coin.addEventListener('animationend', () => coin.remove());
    }
    setInterval(spawnCoin, 1100);
    for(let i=0;i<6;i++) setTimeout(spawnCoin, i*400);
  })();

  /* ── Password toggle ──────────────────────────── */
  const pwInput = document.getElementById('passwordInput');
  document.getElementById('pwToggle').addEventListener('click', function() {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = show
      ? '<ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 2l12 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>'
      : '<ellipse cx="8" cy="8" rx="6.5" ry="4.5" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>';
  });

  /* ── Form logic ───────────────────────────────── */
  const form = document.getElementById('loginForm');
  const btn  = document.getElementById('loginSubmit');
  const genErr = document.getElementById('generalError');
  const genErrTxt = document.getElementById('generalErrorText');

  function clearErrors() {
    document.querySelectorAll('.lp-field-error').forEach(el => {
      el.classList.remove('visible');
      el.querySelector('span').textContent = '';
    });
    document.querySelectorAll('.lp-input').forEach(el => el.classList.remove('invalid'));
    genErr.classList.remove('visible');
    genErrTxt.textContent = '';
  }

  function showFieldError(field, msg) {
    const errEl = document.getElementById(field + 'Error');
    const input = document.getElementById(field + 'Input');
    if (errEl) { errEl.querySelector('span').textContent = msg; errEl.classList.add('visible'); }
    if (input) input.classList.add('invalid');
  }

  function showGeneralError(msg) {
    genErrTxt.textContent = msg;
    genErr.classList.remove('visible');
    void genErr.offsetWidth;
    genErr.classList.add('visible');
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(this.action, {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: new FormData(this),
      });

      const ct = res.headers.get('content-type') || '';
      if (!ct.includes('application/json')) {
        window.location.href = res.url;
        return;
      }

      const data = await res.json();
      if (data.success === false && data.errors) {
        Object.entries(data.errors).forEach(([k, msg]) => showFieldError(k, msg));
      } else if (data.error) {
        showGeneralError(data.error);
      }
    } catch (err) {
      showGeneralError('Ошибка сети. Попробуйте ещё раз.');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
  });
</script>
{% endblock %}
